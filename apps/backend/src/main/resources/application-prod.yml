server:
  port: ${PORT:4000}

spring:
  datasource:
    url: jdbc:postgresql://${PGHOST}:${PGPORT}/${PGDATABASE}
    username: ${PGUSER}
    password: ${PGPASSWORD}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
  mail:
    host: ${SMTP_HOST}
    port: ${SMTP_PORT}
    username: ${SMTP_USER}
    password: ${SMTP_PASS}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: ${SMTP_REQUIRE_TLS}
          ssl:
            enable: ${SMTP_SECURE}
          connectiontimeout: ${SMTP_CONNECTION_TIMEOUT_MS}
          timeout: ${SMTP_SOCKET_TIMEOUT_MS}
          writetimeout: ${SMTP_SOCKET_TIMEOUT_MS}

app:
  swagger:
    enabled: false
  hsts:
    enabled: true
  cors:
    allowed-origins:
      - https://goodearth.in
      - https://*.goodearth.in
      - https://goodearth-postsales-platform.vercel.app
  jwt:
    secret: ${JWT_SECRET}
    expiration-ms: 3600000 # 1 hour session time limits
  auth:
    test-mode: ${TEST_MODE:false}
    test-master-password: ${TEST_MASTER_PASSWORD:}
  zoho:
    client-id: ${ZOHO_CLIENT_ID}
    client-secret: ${ZOHO_CLIENT_SECRET}
    refresh-token: ${ZOHO_REFRESH_TOKEN}
    accounts-url: ${ZOHO_ACCOUNTS_URL}
    crm-api-url: ${ZOHO_CRM_API_URL}
  workdrive:
    api-url: ${ZOHO_WORKDRIVE_API_URL}
  books:
    api-url: ${ZOHO_BOOKS_API_URL}

zoho:
  webhook:
    crm-secret: ${ZOHO_WEBHOOK_CRM_SECRET}
    books-secret: ${ZOHO_WEBHOOK_BOOKS_SECRET}
    workdrive-secret: ${ZOHO_WEBHOOK_WORKDRIVE_SECRET}

razorpay:
  webhook:
    secret: ${RAZORPAY_WEBHOOK_SECRET}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always
