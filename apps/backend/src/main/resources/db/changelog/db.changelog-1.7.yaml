databaseChangeLog:
  - changeSet:
      id: 9-create-workdrive-sync-tables
      author: antigravity
      changes:
        - createTable:
            tableName: workdrive_folders
            columns:
              - column:
                  name: id
                  type: UUID
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: workflow_id
                  type: UUID
                  constraints:
                    nullable: false
                    foreignKeyName: fk_wd_folders_workflows
                    referencedTableName: workflows
                    referencedColumnNames: id
              - column:
                  name: folder_id
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
                    unique: true
              - column:
                  name: folder_name
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
              - column:
                  name: created_at
                  type: TIMESTAMP WITHOUT TIME ZONE
                  constraints:
                    nullable: false
              - column:
                  name: updated_at
                  type: TIMESTAMP WITHOUT TIME ZONE
                  constraints:
                    nullable: false
              - column:
                  name: created_by
                  type: VARCHAR(255)
              - column:
                  name: updated_by
                  type: VARCHAR(255)
        - createTable:
            tableName: workdrive_files
            columns:
              - column:
                  name: id
                  type: UUID
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: folder_id
                  type: UUID
                  constraints:
                    nullable: false
                    foreignKeyName: fk_wd_files_folders
                    referencedTableName: workdrive_folders
                    referencedColumnNames: id
              - column:
                  name: document_id
                  type: UUID
                  constraints:
                    foreignKeyName: fk_wd_files_documents
                    referencedTableName: documents
                    referencedColumnNames: id
              - column:
                  name: change_request_id
                  type: UUID
                  constraints:
                    foreignKeyName: fk_wd_files_change_requests
                    referencedTableName: change_requests
                    referencedColumnNames: id
              - column:
                  name: file_id
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
                    unique: true
              - column:
                  name: file_name
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
              - column:
                  name: mime_type
                  type: VARCHAR(100)
              - column:
                  name: status
                  type: VARCHAR(50)
                  constraints:
                    nullable: false
              - column:
                  name: created_at
                  type: TIMESTAMP WITHOUT TIME ZONE
                  constraints:
                    nullable: false
              - column:
                  name: updated_at
                  type: TIMESTAMP WITHOUT TIME ZONE
                  constraints:
                    nullable: false
              - column:
                  name: created_by
                  type: VARCHAR(255)
              - column:
                  name: updated_by
                  type: VARCHAR(255)
        - createTable:
            tableName: workdrive_file_versions
            columns:
              - column:
                  name: id
                  type: UUID
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: workdrive_file_id
                  type: UUID
                  constraints:
                    nullable: false
                    foreignKeyName: fk_wd_versions_files
                    referencedTableName: workdrive_files
                    referencedColumnNames: id
              - column:
                  name: version
                  type: INTEGER
                  constraints:
                    nullable: false
              - column:
                  name: file_name
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
              - column:
                  name: mime_type
                  type: VARCHAR(100)
              - column:
                  name: preview_url
                  type: VARCHAR(1000)
              - column:
                  name: download_url
                  type: VARCHAR(1000)
              - column:
                  name: uploaded_by
                  type: VARCHAR(255)
              - column:
                  name: uploaded_at
                  type: TIMESTAMP WITHOUT TIME ZONE
              - column:
                  name: created_at
                  type: TIMESTAMP WITHOUT TIME ZONE
                  constraints:
                    nullable: false
              - column:
                  name: updated_at
                  type: TIMESTAMP WITHOUT TIME ZONE
                  constraints:
                    nullable: false
              - column:
                  name: created_by
                  type: VARCHAR(255)
              - column:
                  name: updated_by
                  type: VARCHAR(255)
        - createIndex:
            indexName: idx_wd_folders_workflow_id
            tableName: workdrive_folders
            columns:
              - column:
                  name: workflow_id
        - createIndex:
            indexName: idx_wd_files_folder_id
            tableName: workdrive_files
            columns:
              - column:
                  name: folder_id
        - createIndex:
            indexName: idx_wd_versions_file_id
            tableName: workdrive_file_versions
            columns:
              - column:
                  name: workdrive_file_id
