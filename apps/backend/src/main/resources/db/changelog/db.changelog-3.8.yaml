databaseChangeLog:
  - changeSet:
      id: 38-add-zoho-form-kyc-fields
      author: antigravity
      changes:
        - addColumn:
            tableName: kyc_applications
            columns:
              - column:
                  name: application_date
                  type: VARCHAR(50)
              - column:
                  name: considering_home_loan
                  type: VARCHAR(10)
              - column:
                  name: has_co_applicant
                  type: VARCHAR(10)
              - column:
                  name: has_third_applicant
                  type: VARCHAR(10)
        - addColumn:
            tableName: kyc_applicants
            columns:
              - column:
                  name: salutation
                  type: VARCHAR(20)
              - column:
                  name: first_name
                  type: VARCHAR(100)
              - column:
                  name: last_name
                  type: VARCHAR(100)
              - column:
                  name: guardian_relation
                  type: VARCHAR(20)
              - column:
                  name: guardian_salutation
                  type: VARCHAR(20)
              - column:
                  name: guardian_first_name
                  type: VARCHAR(100)
              - column:
                  name: guardian_last_name
                  type: VARCHAR(100)
              - column:
                  name: guardian_name
                  type: VARCHAR(255)
              - column:
                  name: date_of_birth
                  type: VARCHAR(50)
              - column:
                  name: occupation
                  type: VARCHAR(100)
              - column:
                  name: address_line2
                  type: VARCHAR(500)
              - column:
                  name: address_same_as_primary
                  type: BOOLEAN
              - column:
                  name: address_same_as_secondary
                  type: BOOLEAN
