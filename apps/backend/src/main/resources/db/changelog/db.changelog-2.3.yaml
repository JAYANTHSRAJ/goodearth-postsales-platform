databaseChangeLog:
  - changeSet:
      id: 15-create-family-members
      author: antigravity
      changes:
        - createTable:
            tableName: family_members
            columns:
              - column:
                  name: id
                  type: UUID
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: buyer_id
                  type: UUID
                  constraints:
                    nullable: false
                    foreignKeyName: fk_family_members_buyers
                    referencedTableName: buyers
                    referencedColumnNames: id
              - column:
                  name: name
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
              - column:
                  name: relation
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
              - column:
                  name: email
                  type: VARCHAR(255)
              - column:
                  name: phone
                  type: VARCHAR(255)
              - column:
                  name: created_at
                  type: TIMESTAMP WITHOUT TIME ZONE
                  constraints:
                    nullable: false
              - column:
                  name: updated_at
                  type: TIMESTAMP WITHOUT TIME ZONE
                  constraints:
                    nullable: false
              - column:
                  name: created_by
                  type: VARCHAR(255)
              - column:
                  name: updated_by
                  type: VARCHAR(255)
        - createIndex:
            indexName: idx_family_members_buyer_id
            tableName: family_members
            columns:
              - column:
                  name: buyer_id
