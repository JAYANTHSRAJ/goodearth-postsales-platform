databaseChangeLog:
  - changeSet:
      id: 10-create-finance-tables
      author: antigravity
      changes:
        - createTable:
            tableName: financial_quotes
            columns:
              - column:
                  name: id
                  type: UUID
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: workflow_id
                  type: UUID
                  constraints:
                    nullable: false
                    foreignKeyName: fk_fq_workflows
                    referencedTableName: workflows
                    referencedColumnNames: id
              - column:
                  name: buyer_id
                  type: UUID
                  constraints:
                    nullable: false
                    foreignKeyName: fk_fq_buyers
                    referencedTableName: buyers
                    referencedColumnNames: id
              - column:
                  name: change_request_id
                  type: UUID
                  constraints:
                    foreignKeyName: fk_fq_change_requests
                    referencedTableName: change_requests
                    referencedColumnNames: id
              - column:
                  name: zoho_estimate_id
                  type: VARCHAR(255)
                  constraints:
                    unique: true
              - column:
                  name: amount
                  type: NUMERIC(19, 2)
                  constraints:
                    nullable: false
              - column:
                  name: gst
                  type: NUMERIC(19, 2)
              - column:
                  name: discount
                  type: NUMERIC(19, 2)
              - column:
                  name: status
                  type: VARCHAR(50)
                  constraints:
                    nullable: false
              - column:
                  name: remarks
                  type: VARCHAR(1000)
              - column:
                  name: created_at
                  type: TIMESTAMP WITHOUT TIME ZONE
                  constraints:
                    nullable: false
              - column:
                  name: updated_at
                  type: TIMESTAMP WITHOUT TIME ZONE
                  constraints:
                    nullable: false
              - column:
                  name: created_by
                  type: VARCHAR(255)
              - column:
                  name: updated_by
                  type: VARCHAR(255)
        - createTable:
            tableName: payment_schedules
            columns:
              - column:
                  name: id
                  type: UUID
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: workflow_id
                  type: UUID
                  constraints:
                    nullable: false
                    foreignKeyName: fk_ps_workflows
                    referencedTableName: workflows
                    referencedColumnNames: id
              - column:
                  name: zoho_invoice_id
                  type: VARCHAR(255)
                  constraints:
                    unique: true
              - column:
                  name: amount
                  type: NUMERIC(19, 2)
                  constraints:
                    nullable: false
              - column:
                  name: status
                  type: VARCHAR(50)
                  constraints:
                    nullable: false
              - column:
                  name: due_date
                  type: TIMESTAMP WITHOUT TIME ZONE
              - column:
                  name: remarks
                  type: VARCHAR(1000)
              - column:
                  name: created_at
                  type: TIMESTAMP WITHOUT TIME ZONE
                  constraints:
                    nullable: false
              - column:
                  name: updated_at
                  type: TIMESTAMP WITHOUT TIME ZONE
                  constraints:
                    nullable: false
              - column:
                  name: created_by
                  type: VARCHAR(255)
              - column:
                  name: updated_by
                  type: VARCHAR(255)
        - createTable:
            tableName: payment_receipts
            columns:
              - column:
                  name: id
                  type: UUID
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: workflow_id
                  type: UUID
                  constraints:
                    nullable: false
                    foreignKeyName: fk_pr_workflows
                    referencedTableName: workflows
                    referencedColumnNames: id
              - column:
                  name: zoho_payment_id
                  type: VARCHAR(255)
                  constraints:
                    unique: true
              - column:
                  name: amount
                  type: NUMERIC(19, 2)
                  constraints:
                    nullable: false
              - column:
                  name: status
                  type: VARCHAR(50)
                  constraints:
                    nullable: false
              - column:
                  name: paid_date
                  type: TIMESTAMP WITHOUT TIME ZONE
              - column:
                  name: remarks
                  type: VARCHAR(1000)
              - column:
                  name: created_at
                  type: TIMESTAMP WITHOUT TIME ZONE
                  constraints:
                    nullable: false
              - column:
                  name: updated_at
                  type: TIMESTAMP WITHOUT TIME ZONE
                  constraints:
                    nullable: false
              - column:
                  name: created_by
                  type: VARCHAR(255)
              - column:
                  name: updated_by
                  type: VARCHAR(255)
        - createIndex:
            indexName: idx_fq_workflow_id
            tableName: financial_quotes
            columns:
              - column:
                  name: workflow_id
        - createIndex:
            indexName: idx_ps_workflow_id
            tableName: payment_schedules
            columns:
              - column:
                  name: workflow_id
        - createIndex:
            indexName: idx_pr_workflow_id
            tableName: payment_receipts
            columns:
              - column:
                  name: workflow_id
