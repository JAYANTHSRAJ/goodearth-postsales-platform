databaseChangeLog:
  - changeSet:
      id: 13-create-annotation-tables
      author: antigravity
      changes:
        - createTable:
            tableName: annotations
            columns:
              - column:
                  name: id
                  type: UUID
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: workflow_id
                  type: UUID
                  constraints:
                    nullable: false
                    foreignKeyName: fk_ann_workflows
                    referencedTableName: workflows
                    referencedColumnNames: id
                    deleteCascade: true
              - column:
                  name: document_id
                  type: UUID
                  constraints:
                    nullable: false
                    foreignKeyName: fk_ann_documents
                    referencedTableName: documents
                    referencedColumnNames: id
                    deleteCascade: true
              - column:
                  name: workdrive_file_id
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
              - column:
                  name: author_id
                  type: UUID
                  constraints:
                    nullable: false
                    foreignKeyName: fk_ann_users
                    referencedTableName: users
                    referencedColumnNames: id
                    deleteCascade: true
              - column:
                  name: author_role
                  type: VARCHAR(50)
                  constraints:
                    nullable: false
              - column:
                  name: annotation_type
                  type: VARCHAR(50)
                  constraints:
                    nullable: false
              - column:
                  name: x_coordinate
                  type: NUMERIC(8, 2)
                  constraints:
                    nullable: false
              - column:
                  name: y_coordinate
                  type: NUMERIC(8, 2)
                  constraints:
                    nullable: false
              - column:
                  name: page_number
                  type: INT
                  defaultValueNumeric: 1
                  constraints:
                    nullable: false
              - column:
                  name: color
                  type: VARCHAR(20)
                  defaultValue: '#FF0000'
                  constraints:
                    nullable: false
              - column:
                  name: title
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
              - column:
                  name: description
                  type: TEXT
              - column:
                  name: status
                  type: VARCHAR(50)
                  defaultValue: 'OPEN'
                  constraints:
                    nullable: false
              - column:
                  name: created_at
                  type: TIMESTAMP WITHOUT TIME ZONE
                  constraints:
                    nullable: false
              - column:
                  name: updated_at
                  type: TIMESTAMP WITHOUT TIME ZONE
                  constraints:
                    nullable: false
              - column:
                  name: created_by
                  type: VARCHAR(255)
              - column:
                  name: updated_by
                  type: VARCHAR(255)

        - createTable:
            tableName: annotation_comments
            columns:
              - column:
                  name: id
                  type: UUID
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: annotation_id
                  type: UUID
                  constraints:
                    nullable: false
                    foreignKeyName: fk_comments_ann
                    referencedTableName: annotations
                    referencedColumnNames: id
                    deleteCascade: true
              - column:
                  name: author_id
                  type: UUID
                  constraints:
                    nullable: false
                    foreignKeyName: fk_comments_users
                    referencedTableName: users
                    referencedColumnNames: id
                    deleteCascade: true
              - column:
                  name: author_role
                  type: VARCHAR(50)
                  constraints:
                    nullable: false
              - column:
                  name: comment
                  type: TEXT
                  constraints:
                    nullable: false
              - column:
                  name: created_at
                  type: TIMESTAMP WITHOUT TIME ZONE
                  constraints:
                    nullable: false

        - createTable:
            tableName: annotation_attachments
            columns:
              - column:
                  name: id
                  type: UUID
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: annotation_id
                  type: UUID
                  constraints:
                    nullable: false
                    foreignKeyName: fk_attachments_ann
                    referencedTableName: annotations
                    referencedColumnNames: id
                    deleteCascade: true
              - column:
                  name: workdrive_file_id
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
              - column:
                  name: media_type
                  type: VARCHAR(50)
                  constraints:
                    nullable: false

        - createIndex:
            indexName: idx_ann_workflow_id
            tableName: annotations
            columns:
              - column:
                  name: workflow_id
        - createIndex:
            indexName: idx_ann_document_id
            tableName: annotations
            columns:
              - column:
                  name: document_id
        - createIndex:
            indexName: idx_comments_ann_id
            tableName: annotation_comments
            columns:
              - column:
                  name: annotation_id
        - createIndex:
            indexName: idx_attachments_ann_id
            tableName: annotation_attachments
            columns:
              - column:
                  name: annotation_id
