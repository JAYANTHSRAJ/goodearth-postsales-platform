databaseChangeLog:
  - changeSet:
      id: 3.4-add-missing-columns-to-kyc-applications
      author: antigravity
      preConditions:
        onFail: MARK_RAN
        not:
          columnExists:
            tableName: kyc_applications
            columnName: workflow_id
      changes:
        - addColumn:
            tableName: kyc_applications
            columns:
              - column:
                  name: workflow_id
                  type: UUID

  - changeSet:
      id: 3.4-add-audit-columns-to-kyc-applications
      author: antigravity
      preConditions:
        onFail: MARK_RAN
        not:
          columnExists:
            tableName: kyc_applications
            columnName: created_by
      changes:
        - addColumn:
            tableName: kyc_applications
            columns:
              - column:
                  name: created_by
                  type: VARCHAR(255)
              - column:
                  name: updated_by
                  type: VARCHAR(255)

  - changeSet:
      id: 3.4-create-kyc-audit-logs-table
      author: antigravity
      preConditions:
        onFail: MARK_RAN
        not:
          tableExists:
            tableName: kyc_audit_logs
      changes:
        - createTable:
            tableName: kyc_audit_logs
            columns:
              - column:
                  name: id
                  type: UUID
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: kyc_application_id
                  type: UUID
                  constraints:
                    nullable: false
              - column:
                  name: performed_by_user_id
                  type: UUID
              - column:
                  name: action
                  type: VARCHAR(100)
                  constraints:
                    nullable: false
              - column:
                  name: previous_status
                  type: VARCHAR(50)
              - column:
                  name: new_status
                  type: VARCHAR(50)
              - column:
                  name: snapshot_data
                  type: TEXT
              - column:
                  name: created_at
                  type: TIMESTAMP
                  defaultValueComputed: CURRENT_TIMESTAMP
              - column:
                  name: updated_at
                  type: TIMESTAMP
                  defaultValueComputed: CURRENT_TIMESTAMP
              - column:
                  name: created_by
                  type: VARCHAR(255)
              - column:
                  name: updated_by
                  type: VARCHAR(255)

  - changeSet:
      id: 3.4-add-audit-columns-to-kyc-audit-logs
      author: antigravity
      preConditions:
        onFail: MARK_RAN
        not:
          columnExists:
            tableName: kyc_audit_logs
            columnName: created_by
      changes:
        - addColumn:
            tableName: kyc_audit_logs
            columns:
              - column:
                  name: updated_at
                  type: TIMESTAMP
                  defaultValueComputed: CURRENT_TIMESTAMP
              - column:
                  name: created_by
                  type: VARCHAR(255)
              - column:
                  name: updated_by
                  type: VARCHAR(255)

  - changeSet:
      id: 3.4-create-zoho-sync-logs-table
      author: antigravity
      preConditions:
        onFail: MARK_RAN
        not:
          tableExists:
            tableName: zoho_sync_logs
      changes:
        - createTable:
            tableName: zoho_sync_logs
            columns:
              - column:
                  name: id
                  type: UUID
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: kyc_application_id
                  type: UUID
              - column:
                  name: zoho_deal_id
                  type: VARCHAR(100)
              - column:
                  name: sync_type
                  type: VARCHAR(50)
                  constraints:
                    nullable: false
              - column:
                  name: sync_status
                  type: VARCHAR(50)
                  constraints:
                    nullable: false
              - column:
                  name: attempt_count
                  type: INT
                  defaultValueNumeric: 0
              - column:
                  name: max_attempts
                  type: INT
                  defaultValueNumeric: 3
              - column:
                  name: last_attempt_at
                  type: TIMESTAMP
              - column:
                  name: last_error_message
                  type: TEXT
              - column:
                  name: payload
                  type: TEXT
              - column:
                  name: response_snapshot
                  type: TEXT
              - column:
                  name: created_at
                  type: TIMESTAMP
                  defaultValueComputed: CURRENT_TIMESTAMP
              - column:
                  name: updated_at
                  type: TIMESTAMP
                  defaultValueComputed: CURRENT_TIMESTAMP
              - column:
                  name: created_by
                  type: VARCHAR(255)
              - column:
                  name: updated_by
                  type: VARCHAR(255)

  - changeSet:
      id: 3.4-add-audit-columns-to-zoho-sync-logs
      author: antigravity
      preConditions:
        onFail: MARK_RAN
        not:
          columnExists:
            tableName: zoho_sync_logs
            columnName: created_by
      changes:
        - addColumn:
            tableName: zoho_sync_logs
            columns:
              - column:
                  name: created_by
                  type: VARCHAR(255)
              - column:
                  name: updated_by
                  type: VARCHAR(255)

  - changeSet:
      id: 3.4-create-document-versions-table
      author: antigravity
      preConditions:
        onFail: MARK_RAN
        not:
          tableExists:
            tableName: document_versions
      changes:
        - createTable:
            tableName: document_versions
            columns:
              - column:
                  name: id
                  type: UUID
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: document_id
                  type: UUID
              - column:
                  name: kyc_application_id
                  type: UUID
              - column:
                  name: applicant_type
                  type: VARCHAR(50)
              - column:
                  name: document_type
                  type: VARCHAR(50)
              - column:
                  name: version
                  type: INT
                  defaultValueNumeric: 1
              - column:
                  name: file_name
                  type: VARCHAR(255)
              - column:
                  name: file_path
                  type: VARCHAR(500)
              - column:
                  name: mime_type
                  type: VARCHAR(100)
              - column:
                  name: file_size
                  type: BIGINT
              - column:
                  name: is_deleted
                  type: BOOLEAN
                  defaultValueBoolean: false
              - column:
                  name: workdrive_file_id
                  type: VARCHAR(100)
              - column:
                  name: workdrive_folder_id
                  type: VARCHAR(100)
              - column:
                  name: workdrive_upload_status
                  type: VARCHAR(50)
                  defaultValue: PENDING
              - column:
                  name: workdrive_uploaded_at
                  type: TIMESTAMP
              - column:
                  name: workdrive_last_error
                  type: TEXT
              - column:
                  name: created_at
                  type: TIMESTAMP
                  defaultValueComputed: CURRENT_TIMESTAMP
              - column:
                  name: updated_at
                  type: TIMESTAMP
                  defaultValueComputed: CURRENT_TIMESTAMP
              - column:
                  name: created_by
                  type: VARCHAR(255)
              - column:
                  name: updated_by
                  type: VARCHAR(255)

  - changeSet:
      id: 3.4-add-audit-columns-to-document-versions
      author: antigravity
      preConditions:
        onFail: MARK_RAN
        not:
          columnExists:
            tableName: document_versions
            columnName: created_by
      changes:
        - addColumn:
            tableName: document_versions
            columns:
              - column:
                  name: updated_at
                  type: TIMESTAMP
                  defaultValueComputed: CURRENT_TIMESTAMP
              - column:
                  name: created_by
                  type: VARCHAR(255)
              - column:
                  name: updated_by
                  type: VARCHAR(255)

  - changeSet:
      id: 3.4-add-production-kyc-indexes
      author: antigravity
      preConditions:
        onFail: MARK_RAN
        not:
          indexExists:
            indexName: idx_kyc_workflow_id
      changes:
        - createIndex:
            indexName: idx_kyc_workflow_id
            tableName: kyc_applications
            columns:
              - column:
                  name: workflow_id

  - changeSet:
      id: 3.4-add-kyc-user-id-index
      author: antigravity
      preConditions:
        onFail: MARK_RAN
        not:
          indexExists:
            indexName: idx_kyc_user_id
      changes:
        - createIndex:
            indexName: idx_kyc_user_id
            tableName: kyc_applications
            columns:
              - column:
                  name: user_id

  - changeSet:
      id: 3.4-add-kyc-status-index
      author: antigravity
      preConditions:
        onFail: MARK_RAN
        not:
          indexExists:
            indexName: idx_kyc_status
      changes:
        - createIndex:
            indexName: idx_kyc_status
            tableName: kyc_applications
            columns:
              - column:
                  name: status

  - changeSet:
      id: 3.4-add-sync-log-indexes
      author: antigravity
      preConditions:
        onFail: MARK_RAN
        not:
          indexExists:
            indexName: idx_sync_log_status_type
      changes:
        - createIndex:
            indexName: idx_sync_log_status_type
            tableName: zoho_sync_logs
            columns:
              - column:
                  name: sync_status
              - column:
                  name: sync_type

  - changeSet:
      id: 3.4-add-sync-log-kyc-id-index
      author: antigravity
      preConditions:
        onFail: MARK_RAN
        not:
          indexExists:
            indexName: idx_sync_log_kyc_id
      changes:
        - createIndex:
            indexName: idx_sync_log_kyc_id
            tableName: zoho_sync_logs
            columns:
              - column:
                  name: kyc_application_id

  - changeSet:
      id: 3.4-add-doc-ver-kyc-id-index
      author: antigravity
      preConditions:
        onFail: MARK_RAN
        not:
          indexExists:
            indexName: idx_doc_ver_kyc_id
      changes:
        - createIndex:
            indexName: idx_doc_ver_kyc_id
            tableName: document_versions
            columns:
              - column:
                  name: kyc_application_id
