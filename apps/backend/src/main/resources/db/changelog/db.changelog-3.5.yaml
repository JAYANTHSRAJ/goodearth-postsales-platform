databaseChangeLog:
  - changeSet:
      id: 3.5-add-updated-at-to-kyc-audit-logs
      author: antigravity
      preConditions:
        onFail: MARK_RAN
        not:
          columnExists:
            tableName: kyc_audit_logs
            columnName: updated_at
      changes:
        - addColumn:
            tableName: kyc_audit_logs
            columns:
              - column:
                  name: updated_at
                  type: TIMESTAMP
                  defaultValueComputed: CURRENT_TIMESTAMP

  - changeSet:
      id: 3.5-add-created-by-to-kyc-audit-logs
      author: antigravity
      preConditions:
