spring:
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: create-drop
    show-sql: false
  liquibase:
    enabled: false
  mail:
    host: localhost
    port: 25

app:
  swagger:
    enabled: false
  hsts:
    enabled: false
  cors:
    allowed-origins:
      - "*"
  jwt:
    secret: very_long_random_development_only_jwt_signing_key_secret_key_goodearth
    expiration-ms: 86400000
  auth:
    test-mode: true
    test-master-password: GoodEarth@123
  zoho:
    client-id: mock-client-id
    client-secret: mock-client-secret
    refresh-token: mock-refresh-token
    accounts-url: https://accounts.zoho.in
    crm-api-url: https://crm.zoho.in/crm/v2
    sync:
      enabled: false
  workdrive:
    api-url: https://workdrive.zoho.in/api/v1
  books:
    api-url: https://books.zoho.in/api/v3

zoho:
  webhook:
    crm-secret: mock-crm-secret
    books-secret: mock-books-secret
    workdrive-secret: mock-workdrive-secret

razorpay:
  webhook:
    secret: mock-razorpay-secret
